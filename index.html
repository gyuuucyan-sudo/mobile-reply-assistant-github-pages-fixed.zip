<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>客服回复助手</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header>
      <h1>客服回复助手</h1>
      <p id="status">正在读取数据库...</p>
    </header>
    <section class="controls">
      <select id="listing"></select>
      <select id="room"></select>
      <input id="query" type="search" placeholder="搜索问题 / 关键词">
    </section>
    <section id="candidates" class="candidates"></section>
    <section class="actions">
      <button id="copy-ja">复制日语</button>
      <button id="copy-zh">复制中文</button>
      <button id="copy-en">复制英语</button>
    </section>
    <section class="meta">
      <h2 id="source">匹配来源</h2>
      <p id="note"></p>
    </section>
    <section class="answers">
      <label>中文<textarea id="zh"></textarea></label>
      <label>日语<textarea id="ja"></textarea></label>
      <label>英语<textarea id="en"></textarea></label>
    </section>
  </main>
  <script src="xlsx.full.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
