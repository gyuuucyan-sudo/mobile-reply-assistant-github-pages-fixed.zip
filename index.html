<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>客服回复助手 手机版</title>
  <link rel="stylesheet" href="styles.css?v=168">
</head>
<body>
  <main class="app">
    <header class="top">
      <h1>客服回复助手</h1>
      <p id="status">正在读取信息库...</p>
    </header>

    <section class="controls">
      <select id="listing"></select>
      <select id="room"></select>
      <input id="search" type="search" placeholder="搜索问题 / 输入客服短指令">
    </section>

    <section id="candidates" class="candidates" hidden></section>

    <section class="copybar">
      <button id="copy-ja">复制日语</button>
      <button id="copy-zh">复制中文</button>
      <button id="copy-en">复制英语</button>
    </section>

    <section class="meta">
      <div><b>匹配来源</b><span id="source">-</span></div>
      <div id="note-wrap"><b>内部备注</b><span id="note">-</span></div>
    </section>

    <section class="answers">
      <label>中文<textarea id="zh"></textarea></label>
      <label>日语<textarea id="ja"></textarea></label>
      <label>英语<textarea id="en"></textarea></label>
    </section>
  </main>

  <script src="xlsx.full.min.js?v=168"></script>
  <script src="embedded-db.js?v=168"></script>
  <script src="app.js?v=168"></script>
</body>
</html>
